<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-border-top"></div>

    <header>
        <div class="logo-section">
            <a href="index.html" style="text-decoration: none;"><h1>E-Food</h1></a>
        </div>
        <nav>
            <ul>
              <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="Products.html">Products</a></li>
                <li><a href="seasonal.html">Seasonal</a></li>
                <li><a href="features.html">Features</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="order.html">Order</a></li>
                <li><a href="reserve.html" class="cta-btn">Reserve</a></li>
                <li><a href="Login.html">Login</a></li>
               
        </nav>
    </header>

    <main>
        <section id="reserve" class="hero">
            <h2 class="section-heading">Reserve Your Table</h2>
            <p>Planning a visit? Secure a cozy spot in our bakery for an afternoon tea or tasting experience.</p>
            <form class="reservation-form">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>

                <label for="time">Time</label>
                <select id="time" name="time" required>
                    <option value="">Select Time</option>
                    <option value="10:00">10:00 AM</option>
                    <option value="12:00">12:00 PM</option>
                    <option value="14:00">2:00 PM</option>
                    <option value="16:00">4:00 PM</option>
                </select>

                <label for="guests">Number of Guests</label>
                <input type="number" id="guests" name="guests" min="1" max="8" value="2" required>
                
                <button type="submit" class="cta-btn">Confirm Reservation</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 E-Food Patisserie. Crafted with Patience and Elegance.</p>
    </footer>

    <div class="page-border-bottom"></div>
</body>
</html>
