<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | SweetTreats</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fdfaf5; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .login-container {
            background: #fff;
            width: 100%;
            max-width: 420px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(74, 59, 50, 0.1);
            overflow: hidden;
            position: relative;
        }
        
        .login-img {
            width: 100%;
            height: 280px;
            background: url('cake_category_1777660447849.png') center/cover;
            border-radius: 0 0 80px 0;
            position: relative;
        }
        
        .login-header-text {
            position: absolute;
            bottom: -60px;
            left: 30px;
            right: 30px;
            text-align: center;
        }
        .login-header-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #4a3b32;
            line-height: 1.2;
        }
        .login-header-text span { color: #8b5a33; }
        
        .login-body {
            padding: 80px 40px 40px;
        }
        
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .tab {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #4a3b32;
            cursor: pointer;
            opacity: 0.4;
            transition: 0.3s;
            position: relative;
            font-weight: bold;
        }
        .tab.active {
            opacity: 1;
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #4a3b32;
            border-radius: 2px;
        }
        
        .input-group {
            display: flex;
            align-items: center;
            border-bottom: 1.5px solid #4a3b32;
            padding: 10px 0;
            margin-bottom: 25px;
        }
        .input-group i {
            color: #8b5a33;
            font-size: 1.2rem;
            width: 35px;
        }
        .input-group input {
            border: none;
            outline: none;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            color: #4a3b32;
            width: 100%;
        }
        .input-group input::placeholder { color: #aaa; }
        
        .btn-submit {
            background: #8b5a33;
            color: #fff;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(139, 90, 51, 0.2);
        }
        .btn-submit:hover {
            background: #704728;
            box-shadow: 0 10px 20px rgba(139, 90, 51, 0.4);
            transform: translateY(-2px);
        }
        
        .forgot {
            text-align: center;
            display: block;
            margin-top: 25px;
            color: #4a3b32;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
        }
        
        .or-divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
            color: #8b5a33;
            font-weight: 600;
        }
        .or-divider::before, .or-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1.5px;
            background: #8b5a33;
        }
        .or-divider::before { left: 0; }
        .or-divider::after { right: 0; }
        
        .socials {
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        .socials i {
            font-size: 1.8rem;
            color: #8b5a33;
            cursor: pointer;
            transition: 0.3s;
        }
        .socials i:hover { transform: scale(1.1); color: #704728; }
        
        /* Back button */
        .back-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(255,255,255,0.9);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b5a33;
            cursor: pointer;
            text-decoration: none;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            font-size: 1.2rem;
        }
        .back-btn:hover { background: #fff; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="login-container">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="login-img">
        <div class="login-header-text">
            <h2>Welcome to our <span>SweetTreats</span> Bakery Shop</h2>
        </div>
    </div>
    
    <div class="login-body">
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('signin')">User</div>
            <div class="tab" onclick="switchTab('admin')">Admin</div>
            <div class="tab" onclick="switchTab('signup')">Sign Up</div>
        </div>
        
        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="emailInput" placeholder="Email" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>
            
            <!-- Hidden by default for Sign In -->
            <div class="input-group" id="confirmPassGroup" style="display: none;">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Confirm Password">
            </div>
            
            <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
        </form>
        
        <a href="#" class="forgot" id="forgotLink">Forgot Password?</a>
        
        <div class="or-divider">or</div>
        
        <div class="socials">
            <i class="fa-brands fa-google"></i>
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-x-twitter"></i>
        </div>
        
    </div>
</div>

<script>
    let currentMode = 'signin';

    function switchTab(tab) {
        currentMode = tab;
        const tabs = document.querySelectorAll('.tab');
        const confirmGroup = document.getElementById('confirmPassGroup');
        const submitBtn = document.getElementById('submitBtn');
        const forgotLink = document.getElementById('forgotLink');
        const emailInput = document.getElementById('emailInput');
        
        // Reset active
        tabs.forEach(t => t.classList.remove('active'));

        if (tab === 'signin') {
            tabs[0].classList.add('active');
            confirmGroup.style.display = 'none';
            submitBtn.textContent = 'User Sign In';
            forgotLink.style.display = 'block';
            emailInput.value = '';
            document.querySelector('.login-header-text h2').innerHTML = 'Welcome to our <span>SweetTreats</span> Bakery Shop';
        } else if (tab === 'admin') {
            tabs[1].classList.add('active');
            confirmGroup.style.display = 'none';
            submitBtn.textContent = 'Admin Sign In';
            forgotLink.style.display = 'block';
            emailInput.value = 'admin@gmail.com'; // Default for testing
            document.querySelector('.login-header-text h2').innerHTML = 'Admin Panel <span>SweetTreats</span>';
        } else {
            tabs[2].classList.add('active');
            confirmGroup.style.display = 'flex';
            submitBtn.textContent = 'Sign Up';
            forgotLink.style.display = 'none';
            emailInput.value = '';
            document.querySelector('.login-header-text h2').innerHTML = 'Join our <span>SweetTreats</span> Bakery Family';
        }
    }

    function handleAuth(event) {
        event.preventDefault();
        const email = document.getElementById('emailInput').value.toLowerCase();
        
        if (currentMode === 'admin' && email === 'admin@gmail.com') {
            window.location.href = 'admin_panel.html';
        } else if (currentMode === 'admin') {
            alert('Invalid Admin Credentials. Try admin@gmail.com');
        } else if (email === 'admin@gmail.com') {
            // Even if User tab is selected, let's redirect them to admin just in case, or show error
            window.location.href = 'admin_panel.html';
        } else {
            window.location.href = 'index.html';
        }
    }
</script>



<script>
    let currentModalQty = 1;
    let currentModalBasePrice = 0;
    
    function changeModalQty(change) {
        currentModalQty += change;
        if (currentModalQty < 1) currentModalQty = 1;
        const qtyValEl = document.getElementById('modalQtyVal');
        if (qtyValEl) qtyValEl.textContent = currentModalQty;
        
        const totalEl = document.getElementById('modalTotalPrice');
        if (totalEl && currentModalBasePrice) {
            totalEl.textContent = '₹' + (currentModalBasePrice * currentModalQty);
        }
    }

    function toggleWishlist(btn) {
        if (btn.getAttribute('data-wished') !== 'true') {
            btn.innerHTML = '<i class="fa-solid fa-heart"></i>';
            btn.style.background = '#ff9054';
            btn.style.color = '#fff';
            btn.setAttribute('data-wished', 'true');
            if(typeof showToast === 'function') showToast('Added to Wishlist!');
        } else {
            btn.innerHTML = '<i class="fa-regular fa-heart"></i>';
            btn.style.background = 'transparent';
            btn.style.color = '#ff9054';
            btn.setAttribute('data-wished', 'false');
            if(typeof showToast === 'function') showToast('Removed from Wishlist');
        }
    }

    function generateSuggestions(name) {
        const n = name.toLowerCase();
        let html = '';
        let title = 'Add Drinks';
        
        if (n.includes('cake') || n.includes('cupcake')) {
            title = 'Add Party Essentials';
            html = `
                <div onclick="showToast('Magic Candles Added!')" style="width:75px; flex-shrink:0; height:75px; border-radius:16px; background:#fff; padding:6px; box-shadow:0 5px 15px rgba(0,0,0,0.04); cursor:pointer;"><img src="https://images.unsplash.com/photo-1532054944983-6c820061e860?w=150" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>
                <div onclick="showToast('Party Popper Added!')" style="width:75px; flex-shrink:0; height:75px; border-radius:16px; background:#fff; padding:6px; box-shadow:0 5px 15px rgba(0,0,0,0.04); cursor:pointer;"><img src="https://images.unsplash.com/photo-1530103862676-de8892b12a1f?w=150" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>
                <div onclick="showToast('Happy Birthday Tag Added!')" style="width:75px; flex-shrink:0; height:75px; border-radius:16px; background:#fff; padding:6px; box-shadow:0 5px 15px rgba(0,0,0,0.04); cursor:pointer;"><img src="https://images.unsplash.com/photo-1614088636402-40f41334c9c1?w=150" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>
            `;
        } else if (n.includes('ice cream') || n.includes('gelato')) {
            title = 'Add Toppings';
            html = `
                <div onclick="showToast('Choco Chips Added!')" style="width:75px; flex-shrink:0; height:75px; border-radius:16px; background:#fff; padding:6px; box-shadow:0 5px 15px rgba(0,0,0,0.04); cursor:pointer;"><img src="https://images.unsplash.com/photo-1622329241951-40995085d7b5?w=150" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>
                <div onclick="showToast('Caramel Syrup Added!')" style="width:75px; flex-shrink:0; height:75px; border-radius:16px; background:#fff; padding:6px; box-shadow:0 5px 15px rgba(0,0,0,0.04); cursor:pointer;"><img src="https://images.unsplash.com/photo-1596700816912-ee98274719c8?w=150" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>
                <div onclick="showToast('Waffle Cone Added!')" style="width:75px; flex-shrink:0; height:75px; border-radius:16px; background:#fff; padding:6px; box-shadow:0 5px 15px rgba(0,0,0,0.04); cursor:pointer;"><img src="https://images.unsplash.com/photo-1559182582-77eb93108ee8?w=150" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>
            `;
        } else if (n.includes('macaron') || n.includes('pastry') || n.includes('donut')) {
            title = 'Add Beverages';
            html = `
                <div onclick="showToast('Hot Coffee Added!')" style="width:75px; flex-shrink:0; height:75px; border-radius:16px; background:#fff; padding:6px; box-shadow:0 5px 15px rgba(0,0,0,0.04); cursor:pointer;"><img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=150" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>
                <div onclick="showToast('Iced Latte Added!')" style="width:75px; flex-shrink:0; height:75px; border-radius:16px; background:#fff; padding:6px; box-shadow:0 5px 15px rgba(0,0,0,0.04); cursor:pointer;"><img src="https://images.unsplash.com/photo-1517701550927-30cfcb64db88?w=150" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>
                <div onclick="showToast('Berry Shake Added!')" style="width:75px; flex-shrink:0; height:75px; border-radius:16px; background:#fff; padding:6px; box-shadow:0 5px 15px rgba(0,0,0,0.04); cursor:pointer;"><img src="https://images.unsplash.com/photo-1623065422900-0587b1c3fa4a?w=150" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>
            `;
        } else {
            title = 'Add Drinks';
            html = `
                <div onclick="showToast('Strawberry Splash Added!')" style="width:75px; flex-shrink:0; height:75px; border-radius:16px; background:#fff; padding:6px; box-shadow:0 5px 15px rgba(0,0,0,0.04); cursor:pointer;"><img src="https://images.unsplash.com/photo-1623065422900-0587b1c3fa4a?w=150" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>
                <div onclick="showToast('Iced Coffee Added!')" style="width:75px; flex-shrink:0; height:75px; border-radius:16px; background:#fff; padding:6px; box-shadow:0 5px 15px rgba(0,0,0,0.04); cursor:pointer;"><img src="https://images.unsplash.com/photo-1517701550927-30cfcb64db88?w=150" style="width:100%; height:100%; object-fit:cover; border-radius:10px;"></div>
            `;
        }
        
        const titleEl = document.getElementById('suggestionsTitle');
        if (titleEl) titleEl.textContent = title;
        
        const suggEl = document.getElementById('modalSuggestions');
        if (suggEl) suggEl.innerHTML = html;
    }

    function openProductModal(name, desc, price, img) {
        currentModalQty = 1;
        currentModalBasePrice = price;
        
        const qtyValEl = document.getElementById('modalQtyVal');
        if (qtyValEl) qtyValEl.textContent = currentModalQty;

        const mainNameEl = document.getElementById('categoryMainName');
        if (mainNameEl) mainNameEl.textContent = name;
        
        const mainImgEl = document.getElementById('categoryMainImg');
        if (mainImgEl) {
            mainImgEl.src = img;
            mainImgEl.alt = name;
        }
        
        const mainDescEl = document.getElementById('categoryMainDesc');
        if (mainDescEl) mainDescEl.textContent = desc || 'A classic delight marvel of pastry craftsmanship. Handcrafted with perfection for any celebration, big or small.';
        
        const mainPriceEl = document.getElementById('categoryMainPrice');
        if (mainPriceEl) mainPriceEl.textContent = '₹' + price;
        
        const totalEl = document.getElementById('modalTotalPrice');
        if (totalEl) totalEl.textContent = '₹' + price;
        
        // Reset wishlist button
        const wBtn = document.getElementById('modalWishlistBtn');
        if (wBtn) {
            wBtn.innerHTML = '<i class="fa-regular fa-heart"></i>';
            wBtn.style.background = 'transparent';
            wBtn.style.color = '#ff9054';
        }
        
        // Reset add to cart button
        
        
        const addBtn = document.getElementById('categoryAddBagBtn');
        const textBtn = document.getElementById('categoryAddBagText');
        
        let cartItems = [];
        try { cartItems = JSON.parse(localStorage.getItem('st_cart')) || []; } catch(e){}
        const existing = cartItems.find(i => i.name === name);
        
        if (addBtn) {
            if (existing) {
                addBtn.style.background = '#4CAF50';
                if(textBtn) textBtn.textContent = 'Added to Cart ✓ (' + existing.qty + ')';
            } else {
                addBtn.style.background = 'linear-gradient(90deg, #ff9054, #ff6c2c)';
                if(textBtn) textBtn.textContent = 'Add to Cart';
            }
            
            addBtn.onclick = () => { 
                let currentCart = [];
                try { currentCart = JSON.parse(localStorage.getItem('st_cart')) || []; } catch(e){}
                const itemInCart = currentCart.find(i => i.name === name);
                
                if (itemInCart) {
                    if (itemInCart.qty === currentModalQty) {
                        // Unchanged, just open cart
                    } else {
                        // User changed quantity via + / -, so UPDATE it!
                        itemInCart.qty = currentModalQty;
                        localStorage.setItem('st_cart', JSON.stringify(currentCart));
                        if(typeof showToast === 'function') showToast('Updated quantity to ' + currentModalQty + '!');
                        if (typeof window.renderGlobalCartSidebar === 'function') window.renderGlobalCartSidebar();
                        if (typeof updateCartUI === 'function') updateCartUI();
                    }
                } else {
                    // Not in cart, add it normally
                    if(typeof addToCart === 'function') addToCart(name, price, img, currentModalQty); 
                    if(typeof showToast === 'function') showToast('Added ' + currentModalQty + 'x ' + name + ' to bag!');
                }
                
                addBtn.style.background = '#4CAF50';
                if(textBtn) textBtn.textContent = 'Added to Cart ✓ (' + currentModalQty + ')';
                
                setTimeout(() => {
                    document.getElementById('categoryDetailModal').classList.remove('show');
                    document.getElementById('overlay').classList.remove('show');
                    
                    const sidebar = document.getElementById('cartSidebar');
                    const over = document.getElementById('overlay');
                    if(sidebar) sidebar.classList.add('open');
                    if(over) over.classList.add('show');
                }, 800);
            };
        }
        
        generateSuggestions(name);
        
        const modalEl = document.getElementById('categoryDetailModal');
        if (modalEl) modalEl.classList.add('show');
        
        const overlayEl = document.getElementById('overlay');
        if (overlayEl) overlayEl.classList.add('show');
    }
</script>



<script src="dynamic_render.js"></script>
</body>
</html>
